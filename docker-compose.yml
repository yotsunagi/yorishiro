services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: yorishiro
      POSTGRES_PASSWORD: yorishiro
      POSTGRES_DB: yorishiro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yorishiro"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Runs the actual built binary (multi-stage Dockerfile at the repo root), the same image
  # used for production. Use `make up` / `make admin ...` rather than calling this directly.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./models:/app/models:ro
    environment:
      DATABASE_URL: postgres://yorishiro:yorishiro@db:5432/yorishiro
      YSR_BIND: 0.0.0.0:8080
      RUST_LOG: info
      YSR_EMBEDDING_PROVIDER: local
      YSR_ONNX_MODEL_PATH: models/model.onnx
      YSR_ONNX_TOKENIZER_PATH: models/tokenizer.json
      # Lets the hosted dashboard SPA (served from the `hosted` service's own origin) call
      # this API cross-origin. Self-hosted deployments that never run `hosted` can leave
      # this unset -- an empty value disables CORS entirely, same as before this existed.
      YSR_CORS_ORIGINS: http://localhost:8081
      # Serves web/ (login + first-run setup wizard) from this same process at "/".
      YSR_WEB_DIR: web
      # Single-tenant cap for this community-edition deployment; also what gates the
      # first-run setup wizard (GET/POST /setup) on -- see crates/yorishiro-server/src/rest/setup.rs.
      YORISHIRO_MAX_TENANTS: "1"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # Hosted-only: Stripe webhooks, plan/usage metering, and the admin dashboard SPA (login,
  # usage/billing, member management). Self-hosted deployments never need this service --
  # only start it with `docker compose --profile hosted up` (or `make up-hosted`).
  hosted:
    profiles: ["hosted"]
    build:
      context: .
      dockerfile: Dockerfile.hosted
    environment:
      DATABASE_URL: postgres://yorishiro:yorishiro@db:5432/yorishiro
      YORISHIRO_HOSTED_BIND: 0.0.0.0:8081
      RUST_LOG: info
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy

  # Rust toolchain (cargo/clippy/rustfmt/sqlx-cli) for one-off development commands, run via
  # `make test` / `make fmt` / `make clippy` / `make shell`. Not started by `docker compose up`.
  dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
      # `docker compose run --rm` throws away the container's filesystem after each command,
      # so the registry cache and build output need their own volumes to survive between runs.
      - dev-cargo-registry:/usr/local/cargo/registry
      - dev-target:/workspace/target
    working_dir: /workspace
    environment:
      DATABASE_URL: postgres://yorishiro:yorishiro@db:5432/yorishiro
      RUST_LOG: info
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  dev-cargo-registry:
  dev-target:
