name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://yorishiro:yorishiro@localhost:5432/yorishiro

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: yorishiro
          POSTGRES_PASSWORD: yorishiro
          POSTGRES_DB: yorishiro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yorishiro"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # ort-sysがビルド時にonnxruntimeバイナリを展開する先。デフォルトのキャッシュ
          # 対象（~/.cargo, ./target）に含まれないため、これを保存しないとウォーム
          # キャッシュの2回目以降のCIでリンク時にライブラリが見つからず失敗する。
          cache-directories: ~/.cache/ort.pyke.io

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all
